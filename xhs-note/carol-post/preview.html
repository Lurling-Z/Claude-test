<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Carol 国际生观察 · 12 张封面预览</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&family=Noto+Sans+SC:wght@400;500;700;900&family=Ma+Shan+Zheng&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="./covers.css" />
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="brand-dot"></span>
    Carol's 国际生观察 <span class="muted">· 12 张封面预览</span>
  </div>
  <div class="actions">
    <span class="hint">点击单张可单独下载 · 「下载全部」会按 01-12.png 依次保存</span>
    <button id="downloadAll" class="btn-primary">下载全部 PNG</button>
  </div>
</header>

<main class="grid">

  <!-- ============ 01 - 封面 ============ -->
  <figure class="cover-wrap">
    <div class="cover c-hook" data-num="01" data-name="封面">
      <div class="page-num">01 / 12</div>
      <div class="brand-foot">Carol's 国际生观察</div>

      <div class="hook-eyebrow">— 三年陪学观察 ·  实话实说 —</div>
      <h1 class="hook-title">
        陪 30 个国际生<br/>
        考完雅思后<br/>
        我发现 <em>写作 7.0</em><br/>
        真的 <em>不靠天赋</em>
      </h1>

      <div class="hook-tag">是的<br/>和英语好不好<br/>真的没多大关系</div>

      <div class="hook-deco">
        <svg viewBox="0 0 200 60" width="200" height="60">
          <path d="M5,30 Q50,5 100,30 T195,30" stroke="#E85A4F" stroke-width="3" fill="none" stroke-linecap="round"/>
          <circle cx="100" cy="30" r="5" fill="#E85A4F"/>
        </svg>
      </div>
    </div>
    <figcaption>01 · 强钩封面</figcaption>
  </figure>

  <!-- ============ 02 - 自我介绍 ============ -->
  <figure class="cover-wrap">
    <div class="cover c-intro" data-num="02" data-name="自我介绍">
      <div class="page-num">02 / 12</div>
      <div class="brand-foot">Carol's 国际生观察</div>

      <div class="card-eyebrow">先说一下我是谁</div>
      <h2 class="card-title">我不是雅思老师<br/>也不是考生本人</h2>

      <div class="card-body">
        <p>三年时间</p>
        <p>我陪着身边 <em>30 多个</em> 国际生家庭</p>
        <p>从月考到模考<br/>从焦虑到拿分</p>
        <p class="card-mark">把他们的笔记<br/>攒成了我自己的一份观察</p>
      </div>

      <div class="signature">— Carol</div>
    </div>
    <figcaption>02 · 立人设</figcaption>
  </figure>

  <!-- ============ 03 - 样本背景 ============ -->
  <figure class="cover-wrap">
    <div class="cover c-data" data-num="03" data-name="样本">
      <div class="page-num">03 / 12</div>
      <div class="brand-foot">Carol's 国际生观察</div>

      <div class="card-eyebrow">先甩一下样本</div>
      <h2 class="card-title">我观察的 <em>30 个</em> 孩子</h2>

      <div class="data-grid">
        <div class="data-row">
          <span class="data-label">课程体系</span>
          <span class="data-value">A-Level 18 · IB 7 · AP 5</span>
        </div>
        <div class="data-row">
          <span class="data-label">起点 5.0–5.5</span>
          <span class="data-value">14 人</span>
        </div>
        <div class="data-row">
          <span class="data-label">起点 6.0–6.5</span>
          <span class="data-value">12 人</span>
        </div>
        <div class="data-row">
          <span class="data-label">起点 6.5+</span>
          <span class="data-value">4 人</span>
        </div>
        <div class="data-row data-row-hl">
          <span class="data-label">最终写作 7.0+</span>
          <span class="data-value"><em>9 人</em></span>
        </div>
      </div>

      <div class="data-foot">他们的共同点<br/>不是基础好<br/>是 <em>动作对了</em></div>
    </div>
    <figcaption>03 · 数据可信</figcaption>
  </figure>

  <!-- ============ 04 - 反共识 ============ -->
  <figure class="cover-wrap">
    <div class="cover c-myth" data-num="04" data-name="反共识">
      <div class="page-num">04 / 12</div>
      <div class="brand-foot">Carol's 国际生观察</div>

      <div class="card-eyebrow">先泼一盆冷水</div>
      <h2 class="card-title">写作 7.0<br/>≠ 你想的那些</h2>

      <ul class="myth-list">
        <li class="myth-x"><span class="x">✕</span> 词汇量大</li>
        <li class="myth-x"><span class="x">✕</span> 语法零错误</li>
        <li class="myth-x"><span class="x">✕</span> 模板背得熟</li>
        <li class="myth-x"><span class="x">✕</span> 看了一堆经验贴</li>
        <li class="myth-v"><span class="v">✓</span> <em>让考官读得舒服</em></li>
      </ul>
    </div>
    <figcaption>04 · 反常识钩</figcaption>
  </figure>

  <!-- ============ 05 - 动作 1 ============ -->
  <figure class="cover-wrap">
    <div class="cover c-step" data-num="05" data-name="动作1">
      <div class="page-num">05 / 12</div>
      <div class="brand-foot">Carol's 国际生观察</div>

      <div class="step-num">01</div>
      <h2 class="step-title">先搭骨架<br/>再填血肉</h2>

      <div class="compare">
        <div class="compare-col compare-good">
          <div class="compare-tag">7.0 学生</div>
          <div class="compare-content">
            <p class="line">开头 ▸ 背景 + 立场</p>
            <p class="line">主体 ① ▸ 观点 + 例子 + 分析</p>
            <p class="line">主体 ② ▸ 让步 + 反驳</p>
            <p class="line">结尾 ▸ 重申 + 升华</p>
          </div>
        </div>
        <div class="compare-col compare-bad">
          <div class="compare-tag">5.5 学生</div>
          <div class="compare-content">
            <p class="line scribble">advanced<br/>significant<br/>contemporary<br/>nevertheless...</p>
            <p class="line dim">（一直在抄词）</p>
          </div>
        </div>
      </div>

      <div class="step-foot">差距 在 <em>规划那一步</em> 就拉开了</div>
    </div>
    <figcaption>05 · 动作 1 · 框架</figcaption>
  </figure>

  <!-- ============ 06 - 动作 2 ============ -->
  <figure class="cover-wrap">
    <div class="cover c-step" data-num="06" data-name="动作2">
      <div class="page-num">06 / 12</div>
      <div class="brand-foot">Carol's 国际生观察</div>

      <div class="step-num">02</div>
      <h2 class="step-title">小作文不是一种题<br/><em>是 5 种</em></h2>

      <div class="chart-grid">
        <div class="chart-cell">📊<span>柱状图</span></div>
        <div class="chart-cell">📈<span>线　图</span></div>
        <div class="chart-cell">🥧<span>饼　图</span></div>
        <div class="chart-cell">🔄<span>流程图</span></div>
        <div class="chart-cell chart-cell-hl">🗺️<span>地　图</span></div>
      </div>

      <ul class="bullets">
        <li>7.0 学生 ▸ 每种题型有自己的句式包</li>
        <li>5.5 学生 ▸ 套同一个模板</li>
      </ul>

      <div class="warn">⚠️ 划重点：<em>地图题机考也会出</em>，别赌。</div>
    </div>
    <figcaption>06 · 动作 2 · 题型</figcaption>
  </figure>

  <!-- ============ 07 - 动作 3 ============ -->
  <figure class="cover-wrap">
    <div class="cover c-step" data-num="07" data-name="动作3">
      <div class="page-num">07 / 12</div>
      <div class="brand-foot">Carol's 国际生观察</div>

      <div class="step-num">03</div>
      <h2 class="step-title">建一个<br/>属于自己的 <em>论据库</em></h2>

      <div class="topic-cloud">
        <span class="topic">教育</span>
        <span class="topic">科技</span>
        <span class="topic">环境</span>
        <span class="topic">健康</span>
        <span class="topic">家庭</span>
        <span class="topic">城市</span>
      </div>

      <div class="rule-card">
        <div class="rule-num">2</div>
        <div class="rule-text">
          <strong>每个话题准备 2 个例子</strong><br/>
          一个正面 · 一个反面
        </div>
      </div>

      <div class="step-foot">考前一周还稳的孩子<br/>都是 <em>提前 1 个月</em> 就开始攒的</div>
    </div>
    <figcaption>07 · 动作 3 · 论据库</figcaption>
  </figure>

  <!-- ============ 08 - 动作 4 ============ -->
  <figure class="cover-wrap">
    <div class="cover c-step" data-num="08" data-name="动作4">
      <div class="page-num">08 / 12</div>
      <div class="brand-foot">Carol's 国际生观察</div>

      <div class="step-num">04</div>
      <h2 class="step-title">写完<br/><em>才是开始</em></h2>

      <div class="checklist">
        <div class="check-title">7.0 学生的复盘四问</div>
        <ul>
          <li><span class="ck">☐</span> 题目要求 vs 我答了什么 一样吗？</li>
          <li><span class="ck">☐</span> 框架别人 30 秒能看懂吗？</li>
          <li><span class="ck">☐</span> 哪一段最弱？</li>
          <li><span class="ck">☐</span> 把那段 <em>重写一遍</em></li>
        </ul>
      </div>

      <div class="step-foot">一篇文章 写一次 + 改 2 次<br/><em>量上去了 但不是盲写</em></div>
    </div>
    <figcaption>08 · 动作 4 · 复盘</figcaption>
  </figure>

  <!-- ============ 09 - 动作 5 ============ -->
  <figure class="cover-wrap">
    <div class="cover c-step" data-num="09" data-name="动作5">
      <div class="page-num">09 / 12</div>
      <div class="brand-foot">Carol's 国际生观察</div>

      <div class="step-num">05</div>
      <h2 class="step-title">模考要 <em>像</em><br/>不要 <em>多</em></h2>

      <div class="rule-list">
        <div class="rule-item"><span class="rule-mark">⏱</span><strong>严格 60 分钟</strong> 多 1 秒不算</div>
        <div class="rule-item"><span class="rule-mark">📕</span><strong>不查词典</strong> 想不起来就空着</div>
        <div class="rule-item"><span class="rule-mark">🚫</span><strong>不返修</strong> 当成真考交卷</div>
        <div class="rule-item"><span class="rule-mark">📅</span><strong>一周 1 次</strong> 已经够</div>
      </div>

      <div class="step-foot">练得多 ≠ 练得对<br/><em>真考能复刻 才叫练对了</em></div>
    </div>
    <figcaption>09 · 动作 5 · 模考</figcaption>
  </figure>

  <!-- ============ 10 - 误区清单 ============ -->
  <figure class="cover-wrap">
    <div class="cover c-warning" data-num="10" data-name="误区">
      <div class="page-num">10 / 12</div>
      <div class="brand-foot">Carol's 国际生观察</div>

      <div class="card-eyebrow">说几句真话</div>
      <h2 class="card-title">这些事 <em>真的别做了</em></h2>

      <ul class="warn-list">
        <li><span class="w-no">✕</span> 死背 100 个高级词</li>
        <li><span class="w-no">✕</span> 啃语法书啃到考前</li>
        <li><span class="w-no">✕</span> 一个模板从头用到尾</li>
        <li><span class="w-no">✕</span> 写完就交，不复盘</li>
        <li><span class="w-no">✕</span> 经验贴看了一堆，没动过笔</li>
      </ul>

      <div class="warn-foot">这些 <em>不会让孩子上 7.0</em><br/>反而 拖他后腿</div>
    </div>
    <figcaption>10 · 反向避坑</figcaption>
  </figure>

  <!-- ============ 11 - 学生原话 ============ -->
  <figure class="cover-wrap">
    <div class="cover c-quote" data-num="11" data-name="学生原话">
      <div class="page-num">11 / 12</div>
      <div class="brand-foot">Carol's 国际生观察</div>

      <div class="card-eyebrow">问了 9 个上 7.0 的孩子</div>
      <h2 class="card-title">印象最深的<br/>是 <em>这一句话</em></h2>

      <blockquote class="quote-box">
        <span class="q-mark">"</span>
        <p>
          我妈不再每天<br/>
          问我分数<br/>
          之后<br/><br/>
          我反而<br/>
          开始 进步 了
        </p>
        <span class="q-mark q-mark-end">"</span>
      </blockquote>

      <div class="quote-by">— A-Level 高二 · 女生</div>
    </div>
    <figcaption>11 · 情绪共鸣</figcaption>
  </figure>

  <!-- ============ 12 - 收尾互动 ============ -->
  <figure class="cover-wrap">
    <div class="cover c-end" data-num="12" data-name="收尾">
      <div class="page-num">12 / 12</div>
      <div class="brand-foot">Carol's 国际生观察</div>

      <div class="card-eyebrow">最后一句话</div>
      <h2 class="end-title">
        7.0 不是<br/>
        天赋的事<br/>
        是你愿不愿意<br/>
        <em>每天写一段</em><br/>
        <em>复一遍</em>
      </h2>

      <div class="end-cta">
        <p>评论区告诉我</p>
        <p class="end-q">你家孩子<br/>卡在哪个分数？</p>
        <p class="end-small">我可能整理过 你需要的资料 ☘️</p>
      </div>

      <div class="end-foot">— 持续更新中 —</div>
    </div>
    <figcaption>12 · 互动收尾</figcaption>
  </figure>

</main>

<aside class="usage">
  <h3>📌 使用方式</h3>
  <ol>
    <li>点击右上角 <strong>「下载全部 PNG」</strong> 一次下载 12 张图（按 01-12 顺序）</li>
    <li>或者点击单张封面下方按钮，单独下载</li>
    <li>导出尺寸为 <strong>1242 × 1656</strong>（小红书竖图标准 3:4）</li>
    <li>需要改文字？直接编辑 <code>preview.html</code> 里对应 <code>data-num</code> 的那一块即可</li>
    <li>正文 + 标签 + 评论铺垫话术 → 见同目录 <code>post.md</code></li>
  </ol>
</aside>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="./covers.js"></script>
</body>
</html>
